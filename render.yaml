databases:
  - name: honeypot-db
    plan: free
    databaseName: honeypot_db
    user: honeypot_user

services:
  - type: web
    name: honeypot-api
    runtime: python
    plan: free
    # Force a stable Python version to avoid the pydantic-core build error
    envVars:
      - key: PYTHON_VERSION
        # Use a supported Python version with prebuilt pydantic-core wheels
        value: "3.11.16"
      - key: API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: honeypot-db
          property: connectionString
    buildCommand: pip install -r requirements.txt
    # Removed --reload, kept it production-ready
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
services:
  - type: web
    name: honeypot-api
    runtime: python
    plan: free
    # Force a stable Python version to avoid the pydantic-core build error
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    buildCommand: pip install -r requirements.txt
    # Removed --reload, kept it production-ready
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health